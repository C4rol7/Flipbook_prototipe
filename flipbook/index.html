<script>
document.addEventListener('DOMContentLoaded', function() {

  const flipbookElement = document.getElementById('flipbook');
  const totalPages = 10;

  function isMobile() {
    return window.innerWidth <= 768;
  }

  function calculateSize() {
    let width, height;

    if (isMobile()) {
      const vh = window.innerHeight;
      width = window.innerWidth;
      height = width * 1.414;
      if (height > vh) {
        height = vh;
        width = height / 1.414;
      }
    } else {
      width = window.innerWidth * 0.45;
      height = width * 1.414;
      if (width > 560) {
        width = 560;
        height = width * 1.414;
      }
    }

    return { width, height };
  }

  // crea pagine
  for (let i = 1; i <= totalPages; i++) {
    const page = document.createElement("div");
    page.classList.add("page");
    const img = document.createElement("img");
    img.src = `page${i}.jpg`;
    page.appendChild(img);
    flipbookElement.appendChild(page);
  }

  // dimensioni iniziali
  const { width, height } = calculateSize();

  // inizializza flipbook con spread dinamico
  const pageFlip = new St.PageFlip(flipbookElement, {
    width: width,
    height: height,
    showCover: true,
    startPage: 0,
    drawShadow: true,
    spread: !isMobile(),       // desktop = spread, mobile = singola pagina
    usePortrait: isMobile(),
    size: isMobile() ? "stretch" : "fixed",
    mobileScrollSupport: true,
    clickEventForwarding: true
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  // aggiorna automaticamente se l’utente ruota o ridimensiona
  window.addEventListener("resize", () => {
    const { width, height } = calculateSize();

    pageFlip.update({
      width: width,
      height: height,
      spread: !isMobile(),
      usePortrait: isMobile(),
      size: isMobile() ? "stretch" : "fixed"
    });
  });

});
</script>
