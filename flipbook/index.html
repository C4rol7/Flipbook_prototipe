<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #252121;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

/* contenitore flipbook */
#flipbook {
  display: flex;
  margin: auto;
  justify-content: center;
  align-items: center;
}

/* pagina */
.page {
  background: #000000;
}

/* immagine pagina */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

</style>
</head>

<body>

<div id="flipbook"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const flipbookElement = document.getElementById('flipbook');
  const totalPages = 10;

  /* crea pagine */
  for (let i = 1; i <= totalPages; i++) {
    const page = document.createElement("div");
    page.classList.add("page");

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    flipbookElement.appendChild(page);
  }

  function createPageFlip() {
    let width = window.innerWidth > 768 ? 560 : window.innerWidth * 0.9;
    let height = width * 1.414;

    return new St.PageFlip(flipbookElement, {
      width: width,
      height: height,
      showCover: true,
      startPage: 0,
      spread: window.innerWidth > 768, // doppia pagina solo desktop
      drawShadow: true,
      mobileScrollSupport: true
    });
  }

  let pageFlip = createPageFlip();
  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  /* ridimensiona senza ricaricare */
  window.addEventListener("resize", () => {
    const currentPage = pageFlip.getCurrentPageIndex();
    pageFlip.destroy(); // elimina il vecchio flipbook
    pageFlip = createPageFlip();
    pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    pageFlip.flip(currentPage); // torna alla pagina corrente
  });

});
</script>

</body>
</html>
