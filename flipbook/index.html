<script>
document.addEventListener('DOMContentLoaded', function(){

  const flipbookElement = document.getElementById('flipbook');
  const totalPages = 10;

  function isMobile() {
    return window.innerWidth <= 768;
  }

  let width, height;

  function calculateDimensions() {
    const vh = window.innerHeight;

    if (isMobile()) {
      width = window.innerWidth;
      height = width * 1.414;
      if (height > vh) {
        height = vh;
        width = height / 1.414;
      }
    } else {
      width = window.innerWidth * 0.45;
      height = width * 1.414;
      if (width > 560) {
        width = 560;
        height = width * 1.414;
      }
    }
  }

  // inizializza dimensioni
  calculateDimensions();

  // crea pagine
  for(let i=1;i<=totalPages;i++){
    const page = document.createElement("div");
    page.classList.add("page");

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    flipbookElement.appendChild(page);
  }

  // crea flipbook
  const pageFlip = new St.PageFlip(flipbookElement, {
    width: width,
    height: height,
    showCover: true,
    startPage: 0,
    drawShadow: true,
    spread: !isMobile(),      // desktop → doppia pagina, mobile → singola
    usePortrait: isMobile(),  // mobile singola pagina
    size: isMobile() ? "stretch" : "fixed",
    mobileScrollSupport: true,
    clickEventForwarding: true
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  // aggiorna layout se ridimensiona
  window.addEventListener('resize', () => {
    calculateDimensions();
    pageFlip.updateFromHTML(document.querySelectorAll('.page'));
    pageFlip.updateState({
      width: width,
      height: height,
      spread: !isMobile(),
      usePortrait: isMobile()
    });
  });

});
</script>
