<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #252121;
  font-family: sans-serif;
  overflow: hidden;
}

/* contenitore centrato */
#flipbook {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* singola pagina */
.page {
  background: #000000;
}

/* immagini dentro le pagine */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>

<body>

<div id="flipbook"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){

  const flipbookElement = document.getElementById('flipbook');
  const totalPages = 10;

  function isMobile() {
    return window.innerWidth <= 768;
  }

  let width, height;

  function calculateDimensions() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if (isMobile()) {
      // mobile: singola pagina, grande quanto possibile
      width = vw * 0.95; // piccolo margine
      height = width * 1.414;
      if (height > vh * 0.95) {
        height = vh * 0.95;
        width = height / 1.414;
      }
    } else {
      // desktop: doppia pagina
      width = vw * 0.45;
      height = width * 1.414;
      if (width > 560) {
        width = 560;
        height = width * 1.414;
      }
    }
  }

  // inizializza dimensioni
  calculateDimensions();

  // crea pagine
  for(let i=1;i<=totalPages;i++){
    const page = document.createElement("div");
    page.classList.add("page");

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    flipbookElement.appendChild(page);
  }

  // crea flipbook
  const pageFlip = new St.PageFlip(flipbookElement, {
    width: width,
    height: height,
    showCover: true,
    startPage: 0,
    drawShadow: true,
    spread: !isMobile(),      // desktop → doppia pagina
    usePortrait: isMobile(),  // mobile → singola pagina
    size: isMobile() ? "stretch" : "fixed",
    mobileScrollSupport: true,
    clickEventForwarding: true
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  // aggiorna layout se ridimensiona o ruota
  window.addEventListener('resize', () => {
    calculateDimensions();
    pageFlip.updateFromHTML(document.querySelectorAll('.page'));
    pageFlip.updateState({
      width: width,
      height: height,
      spread: !isMobile(),
      usePortrait: isMobile()
    });
  });

});
</script>

</body>
</html>
