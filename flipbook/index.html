<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#252121;
  font-family:sans-serif;
  overflow:hidden;
}

/* contenitore centrato */
#flipbook {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* pagina */
.page {
  background:#000000;
  touch-action: none; /* per pinch e drag */
}

/* immagini */
.page img {
  width:100%;
  height:100%;
  object-fit:contain;
  transform-origin: center center;
}
</style>
</head>

<body>
<div id="flipbook"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){

  const flipbookElement = document.getElementById('flipbook');
  const totalPages = 10;

  function isMobile() {
    return window.innerWidth <= 768;
  }

  let width, height;

  if (isMobile()) {
    const vh = window.innerHeight;
    width = window.innerWidth;
    height = width * 1.414;
    if (height > vh) {
      height = vh;
      width = height / 1.414;
    }
  } else {
    width = window.innerWidth * 0.45;
    height = width * 1.414;
    if (width > 560) {
      width = 560;
      height = width * 1.414;
    }
  }

  // crea pagine
  for(let i=1;i<=totalPages;i++){
    const page = document.createElement("div");
    page.classList.add("page");

    const img = document.createElement("img");
    img.src = `page${i}.jpg`;

    page.appendChild(img);
    flipbookElement.appendChild(page);
  }

  // inizializza flipbook
  const pageFlip = new St.PageFlip(flipbookElement, {
    width: width,
    height: height,
    showCover: true,
    startPage: 0,
    drawShadow: true,

    spread: !isMobile() ? true : false,
    usePortrait: isMobile(),
    maxSpreadWidth: 768,

    size: isMobile() ? "stretch" : "fixed",
    mobileScrollSupport: true,
    clickEventForwarding: true
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  // --- Pinch zoom mobile ---
  if (isMobile()) {
    let currentScale = 1;
    let startDistance = 0;
    const pageImg = flipbookElement.querySelectorAll('.page img');

    flipbookElement.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

    flipbookElement.addEventListener('touchstart', function(e){
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        startDistance = Math.hypot(dx, dy);
      }
    }, {passive:false});

    flipbookElement.addEventListener('touchmove', function(e){
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const distance = Math.hypot(dx, dy);
        const scale = (distance / startDistance) * currentScale;
        pageImg.forEach(img => img.style.transform = `scale(${scale})`);
      }
    }, {passive:false});

    flipbookElement.addEventListener('touchend', function(e){
      if (e.touches.length < 2) {
        // aggiorna scala corrente
        const style = pageImg[0].style.transform;
        currentScale = parseFloat(style.replace(/[^0-9.]/g,'')) || 1;
        if (currentScale < 1) currentScale = 1; // min zoom
        if (currentScale > 3) currentScale = 3; // max zoom
        pageImg.forEach(img => img.style.transform = `scale(${currentScale})`);
      }
    }, {passive:false});
  }

});
</script>
</body>
</html>
